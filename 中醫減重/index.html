<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中醫減重自我評估</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<style>
:root {
  --hunter:#436436;
  --hunter-pale:#EBF5E7;
  --hunter-rgb:67,100,54;
  --lime:#D6F599;
  --chartreuse:#D2FF28;
  --orange:#C84C09;
  --orange-pale:#FBE9DF;
  --orange-rgb:200,76,9;
  --bordeaux:#420217;
  --bordeaux-mid:rgba(66,2,23,.6);
  --bg:#F4FDE6;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--bordeaux);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── Screens ── */
.screen{
  display:none;
  min-height:100dvh;
  padding-bottom:calc(100px + env(safe-area-inset-bottom));
  animation:fadeIn .35s ease;
}
.screen.active{display:block}
#s0.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── Progress bar ── */
.progress-wrap{
  position:fixed;top:0;left:0;right:0;z-index:40;
  height:5px;background:rgba(210,255,40,.25);
}
.progress-bar{
  height:100%;background:var(--chartreuse);
  transition:width .4s ease;border-radius:0 4px 4px 0;
}

/* ── Sticky CTA ── */
#stickyCTA{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  padding:12px 20px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(to top, var(--bg) 80%, transparent);
  display:flex;flex-direction:column;gap:8px;
  transform:translateY(100%);transition:transform .35s ease;
  pointer-events:none;
}
#stickyCTA.show{transform:none;pointer-events:auto}

/* ── Buttons ── */
.btn-primary{
  display:block;width:100%;
  background:var(--hunter);color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:600;
  padding:16px 24px;border:none;border-radius:20px;cursor:pointer;text-align:center;
  box-shadow:0 6px 0 rgba(var(--hunter-rgb),.35),0 10px 20px rgba(var(--hunter-rgb),.18);
  transition:transform .12s ease,box-shadow .12s ease;touch-action:manipulation;
}
.btn-primary:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(var(--hunter-rgb),.35),0 5px 12px rgba(var(--hunter-rgb),.15)}
.btn-ghost{
  display:block;width:100%;
  background:transparent;color:var(--bordeaux);
  font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:500;
  padding:12px 24px;border:2px solid rgba(66,2,23,.2);border-radius:20px;
  cursor:pointer;text-align:center;transition:background .15s;touch-action:manipulation;
}
.btn-ghost:active{background:rgba(66,2,23,.06)}

/* ── Screen 0: Welcome ── */
.hero-img{
  width:100%;height:260px;object-fit:cover;object-position:center 30%;
  border-radius:0 0 32px 32px;
}
.hero-img-fallback{
  width:100%;height:260px;border-radius:0 0 32px 32px;
  background:linear-gradient(135deg,#EBF5E7 0%,#D6F599 60%,#D2FF28 100%);
  display:flex;align-items:center;justify-content:center;
}
.hero-content{padding:28px 24px 20px}
.tag-pill{
  display:inline-block;background:var(--chartreuse);color:var(--bordeaux);
  font-size:12px;font-weight:700;letter-spacing:.08em;
  padding:4px 12px;border-radius:20px;margin-bottom:16px;
}
.hero-title{
  font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;
  line-height:1.45;color:var(--bordeaux);margin-bottom:12px;
}
.hero-sub{font-size:15px;line-height:1.9;color:var(--bordeaux-mid);margin-bottom:24px}
.hero-card{
  background:var(--lime);border-radius:24px;padding:18px 20px;
  box-shadow:0 6px 0 rgba(var(--hunter-rgb),.12),0 10px 24px rgba(var(--hunter-rgb),.08);
  margin:0 24px 28px;
}
.hero-card p{font-size:14px;line-height:1.9;color:var(--bordeaux)}
.hero-card strong{color:var(--hunter);font-weight:700}

/* ── Screen 1 ── */
#s1{padding:32px 24px 20px}
.section-label{
  font-size:12px;font-weight:700;letter-spacing:.1em;
  color:var(--orange);text-transform:uppercase;margin-bottom:8px;
}
.screen-title{
  font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;
  line-height:1.5;margin-bottom:8px;
}
.screen-sub{font-size:14px;line-height:1.8;color:var(--bordeaux-mid);margin-bottom:28px}
.check-group{display:flex;flex-direction:column;gap:12px;margin-bottom:32px}
.check-card{
  display:flex;align-items:flex-start;gap:14px;
  background:var(--lime);border-radius:20px;padding:18px 16px;
  box-shadow:0 4px 0 rgba(var(--hunter-rgb),.08),0 8px 16px rgba(var(--hunter-rgb),.05);
  cursor:pointer;border:2px solid transparent;
  transition:border-color .15s,transform .12s;touch-action:manipulation;
}
.check-card.selected{border-color:var(--orange)}
.check-card:active{transform:scale(.98)}
.check-box{
  width:22px;height:22px;min-width:22px;border-radius:6px;
  border:2px solid rgba(200,76,9,.35);
  transition:background .15s,border-color .15s;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.check-card.selected .check-box{background:var(--orange);border-color:var(--orange)}
.check-tick{display:none}
.check-card.selected .check-tick{display:block}
.check-label{font-size:15px;line-height:1.65;color:var(--bordeaux)}

/* ── Quiz ── */
.quiz-screen{padding:28px 24px 20px}
.q-progress{font-size:13px;font-weight:700;color:var(--hunter);margin-bottom:6px}
.q-text{
  font-family:'Noto Serif TC',serif;font-size:20px;font-weight:600;
  line-height:1.6;margin-bottom:8px;color:var(--bordeaux);
}
.q-hint{font-size:13px;line-height:1.7;color:var(--bordeaux-mid);margin-bottom:28px}
.option-group{display:flex;flex-direction:column;gap:10px}
.option-btn{
  position:relative;
  background:var(--lime);border:2px solid transparent;
  border-radius:20px;padding:18px 20px;
  font-family:'Noto Sans TC',sans-serif;font-size:15px;line-height:1.5;
  color:var(--bordeaux);cursor:pointer;text-align:left;
  box-shadow:0 4px 0 rgba(var(--hunter-rgb),.08),0 8px 16px rgba(var(--hunter-rgb),.05);
  transition:border-color .12s,transform .1s;
  touch-action:manipulation;width:100%;
}
.option-btn:active{transform:scale(.98)}
.opt-inner{display:flex;align-items:center;gap:11px}
.opt-dot{
  flex-shrink:0;width:7px;height:7px;
  border-radius:50%;background:rgba(66,2,23,.2);transition:background .12s;
}
.option-btn.selected .opt-dot{background:var(--orange)}
.option-btn.selected::after{
  content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;background:var(--orange);border-radius:50%;
  box-shadow:0 0 0 3px rgba(var(--orange-rgb),.22);
}
.option-btn.selected{border-color:var(--orange)}

/* ── Result ── */
#s5{padding:28px 24px calc(220px + env(safe-area-inset-bottom))}
.result-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--lime);border-radius:16px;
  padding:10px 16px;margin-bottom:20px;
  box-shadow:0 4px 0 rgba(var(--hunter-rgb),.08),0 8px 16px rgba(var(--hunter-rgb),.05);
}
.result-badge span{font-size:14px;font-weight:600;color:var(--bordeaux)}
.result-title{
  font-family:'Noto Serif TC',serif;font-size:24px;font-weight:700;
  line-height:1.5;margin-bottom:12px;color:var(--bordeaux);
}
.result-body{font-size:15px;line-height:1.9;color:var(--bordeaux-mid);margin-bottom:28px}
.aspect-cards{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.aspect-card{
  background:var(--lime);border-radius:24px;padding:20px 18px;
  box-shadow:0 6px 0 rgba(var(--hunter-rgb),.1),0 10px 20px rgba(var(--hunter-rgb),.07);
  display:flex;gap:14px;align-items:flex-start;
}
.aspect-icon{
  width:44px;height:44px;min-width:44px;border-radius:14px;
  background:var(--hunter-pale);
  display:flex;align-items:center;justify-content:center;
}
.aspect-icon.orange{background:var(--orange-pale)}
.aspect-name{font-size:13px;font-weight:700;color:var(--hunter);margin-bottom:4px;letter-spacing:.02em}
.aspect-name.orange{color:var(--orange)}
.aspect-headline{font-size:16px;font-weight:700;color:var(--bordeaux);margin-bottom:6px;line-height:1.4}
.aspect-desc{font-size:13px;line-height:1.8;color:var(--bordeaux-mid)}
.ref-note{
  background:rgba(210,255,40,.3);border-radius:16px;padding:14px 16px;
  font-size:12px;line-height:1.7;color:var(--bordeaux);opacity:.75;margin-bottom:24px;
}
.consult-box{
  background:var(--lime);border-radius:24px;padding:20px 18px;
  box-shadow:0 6px 0 rgba(var(--hunter-rgb),.1),0 10px 20px rgba(var(--hunter-rgb),.07);
  font-size:15px;line-height:1.9;color:var(--bordeaux-mid);margin-bottom:24px;
}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<!-- Screen 0 -->
<div class="screen active" id="s0">
  <div style="position:relative">
    <img src="./hero.webp" alt="中醫減重門診"
      class="hero-img"
      onerror="this.style.display='none';document.getElementById('heroFallback').style.display='flex'">
    <div id="heroFallback" style="display:none" class="hero-img-fallback">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#436436" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 12l2 2 4-4"/>
      </svg>
    </div>
  </div>
  <div class="hero-content">
    <span class="tag-pill">TCM WEIGHT MANAGEMENT</span>
    <h1 class="hero-title">看減重門診，<br>買的不只是藥，是方向</h1>
    <p class="hero-sub">4 個問題，找出你減重卡住的地方，確認中醫減重門診是否適合你現在的需求。大約 1 分鐘。</p>
  </div>
  <div class="hero-card">
    <p>減重方法正確，不一定需要藥物也會有效果。但找到<strong>真正卡住的地方</strong>、建立能長久維持的方式，往往比靠意志力硬撐更重要。這個測驗幫你先釐清自己的狀況。</p>
  </div>
</div>

<!-- Screen 1: 情況確認 -->
<div class="screen" id="s1">
  <div class="section-label">先確認一下</div>
  <h2 class="screen-title">有這些情況的話，<br>讓醫師先了解比較好</h2>
  <p class="screen-sub">這些狀況不代表不能做減重門診，而是讓醫師在評估時能更準確地幫你規劃方向。</p>
  <div class="check-group">
    <label class="check-card" data-val="pregnant">
      <div class="check-box">
        <svg class="check-tick" width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 5l4 4 7-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="check-label">目前懷孕、哺乳或備孕中</span>
    </label>
    <label class="check-card" data-val="medical">
      <div class="check-box">
        <svg class="check-tick" width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 5l4 4 7-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="check-label">有慢性疾病或固定需要服藥</span>
    </label>
    <label class="check-card" data-val="eating">
      <div class="check-box">
        <svg class="check-tick" width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 5l4 4 7-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="check-label">曾有過極端節食、暴食，或與飲食相關的困擾</span>
    </label>
    <label class="check-card" data-val="surgery">
      <div class="check-box">
        <svg class="check-tick" width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 5l4 4 7-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="check-label">近期有手術或身體狀況有較大的變化</span>
    </label>
  </div>
</div>

<!-- Screens 2–4 -->
<div class="screen quiz-screen" id="s2"></div>
<div class="screen quiz-screen" id="s3"></div>
<div class="screen quiz-screen" id="s4"></div>

<!-- Screen 5: Result -->
<div class="screen" id="s5"></div>

<!-- Sticky CTA -->
<div id="stickyCTA"></div>

<script>
const TOTAL_SCREENS = 6;
const RESULT_SCREEN = 5;
let currentScreen = 0;
let contraFlags = new Set();
let selectedOptions = {};

const QUESTIONS = [
  {
    q: '你減重最卡住的地方是？',
    hint: '選最符合你目前狀況的一項',
    options: [
      { val:'plateau',  pts:2, label:'吃得不多，但體重就是不動了' },
      { val:'yoyo',     pts:2, label:'節食可以瘦，但一恢復正常就慢慢復胖' },
      { val:'control',  pts:2, label:'飲食很難控制，常因壓力、疲倦或聚餐失控' },
      { val:'unclear',  pts:1, label:'不確定哪裡出了問題，就是瘦不了' },
    ]
  },
  {
    q: '你試過的方式，結果怎樣？',
    hint: '選最接近你過去經驗的',
    options: [
      { val:'tried_many',       pts:2, label:'試過很多方法，短期有效，長期都無法維持' },
      { val:'tried_exercise',   pts:2, label:'運動加節食都做，但一鬆懈就反彈' },
      { val:'tried_willpower',  pts:2, label:'靠意志力撐，但身體越來越累，信心也消耗了' },
      { val:'not_tried',        pts:1, label:'其實還沒認真試過，不知道從哪裡開始' },
    ]
  },
  {
    q: '這次你最希望能做到什麼？',
    hint: '選最在意的一項',
    options: [
      { val:'no_rebound', pts:2, label:'瘦下來又不復胖，能長久維持' },
      { val:'understand', pts:2, label:'弄清楚自己為什麼卡住，找到真正的問題' },
      { val:'lifestyle',  pts:2, label:'在真實生活裡找到能維持的飲食方式' },
      { val:'guidance',   pts:1, label:'有個專業的人陪著，不要自己瞎摸索' },
    ]
  }
];

const ASPECT_BY_VAL = {
  plateau: {
    icon:'hunter', name:'代謝卡住了',
    headline:'吃不多還是瘦不了，可能不是意志力的問題',
    desc:'長期節食後，身體為了保護自己會調降基礎代謝，讓熱量消耗變少。醫師會從體質、飲食內容、蛋白質攝取與活動量一起評估，找出代謝卡住的環節。'
  },
  yoyo: {
    icon:'orange', name:'溜溜球循環',
    headline:'一恢復正常就復胖，代表「正常」需要被重新定義',
    desc:'復胖的根本原因，是減重過程中建立的飲食方式無法長久維持。醫師的工作不只是讓你在療程內瘦，更是幫你建立停藥後還能帶走的飲食判斷能力。'
  },
  control: {
    icon:'orange', name:'壓力型飲食失控',
    headline:'情緒和壓力讓飲食很難控制，這不是軟弱',
    desc:'壓力型進食、社交場合失控，是很多人的真實困境。減重門診除了處理飲食內容，也會討論在這些情境下能真正做到的策略，不是靠意志力禁止，而是找到能和高熱量食物相處的方式。'
  },
  unclear: {
    icon:'hunter', name:'找出真正卡住的地方',
    headline:'不知道哪裡出了問題，是最值得被回答的問題',
    desc:'很多時候，減重卡住不是因為不努力。初診時醫師會系統性地看你的飲食、睡眠、排便、作息、壓力與月經狀況，幫你找出真正阻礙前進的環節。'
  },
  tried_many: {
    icon:'orange', name:'方法都試過了，差在哪？',
    headline:'試了很多卻都沒用，可能差在執行細節或根本方向',
    desc:'每一套方法都有它適合的體質與生活型態。醫師會幫你回顧過去嘗試的方式，找出是哪個環節讓效果無法持續，而不是再給你一套新的清單讓你試試看。'
  },
  tried_exercise: {
    icon:'hunter', name:'運動加節食還是卡關',
    headline:'都做了還是卡住，代表細節需要被調整',
    desc:'運動和節食的搭配方式，對效果影響很大。蛋白質攝取不足、阻力訓練比例不對、熱量壓得太低——這些細節的差異，往往比做不做更重要。'
  },
  tried_willpower: {
    icon:'orange', name:'意志力不是唯一答案',
    headline:'靠撐到筋疲力竭，代表方法需要被重新設計',
    desc:'如果一套方法需要你用盡意志力才能維持，它就不是真正適合你的方法。減重不應該越做越累、越做越焦慮。醫師幫你找的，是你真正能長久做到的方式。'
  },
  not_tried: {
    icon:'hunter', name:'第一次認真開始',
    headline:'還沒走過彎路，是找對方法最好的時機',
    desc:'從一開始就有醫師協助校準方向，可以省掉很多試錯的時間和身體消耗。初診時醫師會先評估你的體質與生活狀況，幫你建立一個真正適合你的起點。'
  },
  no_rebound: {
    icon:'hunter', name:'不復胖的能力',
    headline:'不復胖，才是減重真正的目標',
    desc:'停藥後能不能維持，才是真正的考驗。這也是為什麼減重門診的重點不只是讓體重下降，更是讓你在療程中慢慢建立起——不小心吃多時知道怎麼調整、聚餐時知道怎麼安排、工作忙時知道最低限度能做什麼。'
  },
  understand: {
    icon:'orange', name:'看懂自己的身體',
    headline:'弄清楚卡在哪裡，比再試一個方法更重要',
    desc:'醫師會系統性地幫你梳理：你是不是吃太少反而難維持？蛋白質夠嗎？睡眠和壓力有沒有在影響代謝？看懂了，才能做出對的調整，而不是繼續猜。'
  },
  lifestyle: {
    icon:'hunter', name:'真實生活裡能維持的方式',
    headline:'聚餐、壓力、工作忙——這些都要能放進去',
    desc:'真正能長久維持的減重方式，必須能放進你真實的生活裡，包括應酬、節日、工作忙碌和想吃的食物。醫師幫你建立的，不是完美菜單，而是在真實生活中能持續執行的判斷能力。'
  },
  guidance: {
    icon:'orange', name:'有人陪你校準方向',
    headline:'減重不需要自己一個人摸索',
    desc:'當你卡住時，有人能看清楚卡在哪裡；當你走偏時，有人能幫你校準方向；當你想放棄時，有人能幫你找回繼續的理由。這是找醫師的真正意義，也是和自己埋頭苦幹最大的差別。'
  },
};

const ICON_SVG = {
  hunter: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#436436" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  orange: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C84C09" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`,
};

function updateProgress(){
  const pct = Math.round((currentScreen / (TOTAL_SCREENS - 1)) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
}
function showScreen(idx){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s' + idx).classList.add('active');
  window.scrollTo({ top:0, behavior:'instant' });
  currentScreen = idx;
  updateProgress();
}
function showCTA(html){ const b = document.getElementById('stickyCTA'); b.innerHTML = html; b.classList.add('show'); }
function hideCTA(){ document.getElementById('stickyCTA').classList.remove('show'); }

/* ── S0 ── */
function initS0(){
  showCTA(`<button class="btn-primary" id="startBtn">開始自我評估</button>`);
  document.getElementById('startBtn').addEventListener('click', () => { hideCTA(); showScreen(1); initS1(); });
}

/* ── S1 ── */
function initS1(){
  document.querySelectorAll('#s1 .check-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('selected');
      const v = card.dataset.val;
      if(card.classList.contains('selected')) contraFlags.add(v);
      else contraFlags.delete(v);
    });
  });
  showCTA(`
    <button class="btn-primary" id="contraNextBtn">沒有，繼續</button>
    <button class="btn-ghost" id="contraAskBtn">有，想讓醫師先了解</button>
  `);
  document.getElementById('contraNextBtn').addEventListener('click', () => {
    if(contraFlags.size > 0){ hideCTA(); showScreen(RESULT_SCREEN); buildAsk(); return; }
    hideCTA(); showScreen(2);
  });
  document.getElementById('contraAskBtn').addEventListener('click', () => {
    if(contraFlags.size === 0) contraFlags.add('general');
    hideCTA(); showScreen(RESULT_SCREEN); buildAsk();
  });
}

/* ── Build quiz ── */
function buildQuestion(screenId, qIdx){
  const q = QUESTIONS[qIdx];
  const el = document.getElementById('s' + screenId);
  el.innerHTML = `
    <div class="q-progress">第 ${qIdx + 1} 題，共 ${QUESTIONS.length} 題</div>
    <h2 class="q-text">${q.q}</h2>
    <p class="q-hint">${q.hint}</p>
    <div class="option-group">
      ${q.options.map(o => `
        <button class="option-btn" data-val="${o.val}" data-pts="${o.pts}">
          <span class="opt-inner"><span class="opt-dot" aria-hidden="true"></span>${o.label}</span>
        </button>
      `).join('')}
    </div>
  `;
  el.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedOptions[screenId] = { val: btn.dataset.val, pts: parseInt(btn.dataset.pts) };
      const nextScreen = screenId + 1;
      setTimeout(() => {
        hideCTA();
        if(nextScreen <= 4){ showScreen(nextScreen); }
        else { showScreen(RESULT_SCREEN); buildResult(); }
      }, 300);
    });
  });
}

/* ── Build result ── */
function buildResult(){
  let total = 0;
  const vals = [];
  Object.values(selectedOptions).forEach(({ val, pts }) => {
    total += pts;
    vals.push(val);
  });

  const el = document.getElementById('s' + RESULT_SCREEN);

  const seen = new Set();
  const cardKeys = vals.filter(v => {
    const d = ASPECT_BY_VAL[v];
    if(!d || seen.has(d.name)) return false;
    seen.add(d.name);
    return true;
  });

  function renderCards(keys){
    return `<div class="aspect-cards">${keys.map(k => {
      const d = ASPECT_BY_VAL[k];
      return `<div class="aspect-card">
        <div class="aspect-icon ${d.icon === 'orange' ? 'orange' : ''}">${ICON_SVG[d.icon]}</div>
        <div>
          <div class="aspect-name ${d.icon === 'orange' ? 'orange' : ''}">${d.name}</div>
          <div class="aspect-headline">${d.headline}</div>
          <div class="aspect-desc">${d.desc}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  if(total >= 4){
    el.innerHTML = `
      <div class="result-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#436436" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>很符合來門診的方向</span>
      </div>
      <h2 class="result-title">中醫減重門診<br>很適合你現在的需求</h2>
      <p class="result-body">根據你的填答，以下是對應你情況的說明——</p>
      ${renderCards(cardKeys)}
      <div class="ref-note">中醫減重門診需由醫師評估體質與生活狀況後安排，效果因個人配合程度與體質不同而異。本測驗僅供參考，不構成醫療診斷。</div>
    `;
    showCTA(`
      <button class="btn-primary" id="mainBtn">向櫃檯詢問，安排減重門診</button>
      <button class="btn-ghost" id="backBtn">回到產品目錄</button>
    `);
  } else {
    el.innerHTML = `
      <div class="result-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C84C09" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>有些方向值得先了解</span>
      </div>
      <h2 class="result-title">可以先諮詢看看，<br>不一定要馬上決定</h2>
      <p class="result-body">你可能還在摸索適合自己的方向，或目前狀況還沒到最需要門診的時候。但如果你對自己的減重卡關有任何疑問，歡迎先來問問——不一定要帶著很明確的目標，帶著問題來就好。</p>
      ${renderCards(cardKeys.slice(0, 2))}
      <div class="ref-note">減重門診屬自費門診，初診時醫師會先評估是否適合，你也可以先來問問再決定。本測驗僅供參考，不構成醫療診斷。</div>
    `;
    showCTA(`
      <button class="btn-primary" id="mainBtn">向櫃檯詢問，了解門診內容</button>
      <button class="btn-ghost" id="backBtn">回到產品目錄</button>
    `);
  }

  document.getElementById('mainBtn').addEventListener('click', () => { window.location.href = '../index.html'; });
  document.getElementById('backBtn').addEventListener('click', () => { window.location.href = '../index.html'; });
}

/* ── Build ask ── */
function buildAsk(){
  const el = document.getElementById('s' + RESULT_SCREEN);
  let bodyText = '你勾選的情況，讓醫師在初診時先了解，能幫助他更準確地幫你規劃減重方向。這不代表你不能做減重門診，而是讓評估更完整、更安全。';
  if(contraFlags.has('pregnant')){
    bodyText = '懷孕、哺乳或備孕期間，體重管理的方式需要特別調整。建議先向同仁說明你目前的狀況，讓醫師評估最合適的安排時機與方向。';
  } else if(contraFlags.has('medical')){
    bodyText = '有慢性疾病或固定用藥的情況，醫師在安排減重計畫時需要先了解你目前的用藥內容，確認中藥與現有藥物之間是否需要特別注意。建議先向同仁說明，我們協助安排。';
  } else if(contraFlags.has('eating')){
    bodyText = '有過極端節食或飲食相關困擾的經驗，醫師在評估時需要多一些了解，避免新的方式對身體造成額外的壓力。歡迎先和同仁說明，讓醫師用更適合你的節奏一起討論。';
  } else if(contraFlags.has('surgery')){
    bodyText = '近期身體狀況有較大的變化或剛完成手術，建議先讓身體穩定後再安排減重評估，或讓醫師先了解你目前的恢復狀況，再決定適合的切入時機。';
  }
  el.innerHTML = `
    <div class="section-label">讓醫師先了解一下</div>
    <h2 class="result-title">你的情況，<br>醫師初診時需要先知道</h2>
    <div class="consult-box">
      <p>${bodyText}</p>
    </div>
    <div class="ref-note">這不代表你不能做減重門診，只是讓醫師掌握更完整的狀況，評估才能更準確、更安全。</div>
  `;
  showCTA(`
    <button class="btn-primary" id="mainBtn">向櫃檯詢問，同仁協助安排</button>
    <button class="btn-ghost" id="backBtn">回到產品目錄</button>
  `);
  document.getElementById('mainBtn').addEventListener('click', () => { window.location.href = '../index.html'; });
  document.getElementById('backBtn').addEventListener('click', () => { window.location.href = '../index.html'; });
}

/* ── Init ── */
[2, 3, 4].forEach((sid, qi) => buildQuestion(sid, qi));
initS0();
updateProgress();
</script>
</body>
</html>
