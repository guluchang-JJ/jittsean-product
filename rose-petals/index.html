<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>玫瑰花安心飲片 ｜ 適合我嗎？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&family=Cormorant:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Coolors palette: 2D2D2A / 4C4C47 / 848FA5 / C14953 / E5DCC5 ── */
      --sand:         #E5DCC5;
      --sand-pale:    #F7F4ED;
      --brick:        #C14953;
      --brick-d:      #9E2E3E;
      --graphite:     #2D2D2A;
      --charcoal:     #4C4C47;
      --lavender:     #848FA5;
      --lavender-pale:#EEF0F5;

      --text:         #2D2D2A;
      --text-sub:     #4C4C47;
      --text-muted:   #7A7888;
      --cta:          #C14953;

      --r-card: 24px;
      --r-btn:  60px;
      --r-opt:  18px;

      --border: 2px solid rgba(45,45,42,.16);

      --sh-card:
        0 5px 0 rgba(45,45,42,.14),
        0 10px 28px rgba(45,45,42,.08),
        inset 0 1.5px 3px rgba(255,255,255,.80),
        inset 0 -1px 3px rgba(45,45,42,.04);

      --sh-btn:
        0 6px 0 rgba(120,28,42,.52),
        0 8px 22px rgba(193,73,83,.30);

      --sh-btn-press:
        0 2px 0 rgba(120,28,42,.44),
        0 3px 8px rgba(193,73,83,.16);

      --sh-opt:
        0 3px 0 rgba(45,45,42,.10),
        0 5px 14px rgba(45,45,42,.05),
        inset 0 1px 2px rgba(255,255,255,.80);

      --sh-opt-sel:
        0 4px 0 rgba(45,45,42,.16),
        0 8px 22px rgba(45,45,42,.09),
        inset 0 1px 2px rgba(255,255,255,.80);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--sand-pale);
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       BACKGROUND BLOBS
       ============================================================ */
    .blob-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(60px); opacity: .18;
    }
    .blob-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #C14953 0%, #9E2E3E 100%);
      top: -60px; right: -50px;
    }
    .blob-2 {
      width: 240px; height: 240px;
      background: radial-gradient(circle, #848FA5 0%, #EEF0F5 100%);
      bottom: 25%; left: -60px;
    }
    .blob-3 {
      width: 180px; height: 180px;
      background: radial-gradient(circle, #E5DCC5 0%, #C8B89A 100%);
      bottom: -30px; right: 8%; opacity: .25;
    }

    /* ============================================================
       APP WRAPPER
       ============================================================ */
    .app {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
    }
    .quiz-wrap {
      max-width: 480px; margin: 0 auto;
      width: 100%; flex: 1;
      padding: 0 18px calc(100px + env(safe-area-inset-bottom));
    }

    /* ============================================================
       PROGRESS BAR
       ============================================================ */
    .progress-wrap { margin-bottom: 20px; display: none; padding-top: 16px; }
    .progress-wrap.show { display: block; }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
    }
    .progress-track {
      height: 7px; background: var(--sand);
      border-radius: 50px; border: 1.5px solid rgba(45,45,42,.14);
      overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,.05);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--lavender), var(--brick));
      border-radius: 50px; width: 0%;
      transition: width .4s cubic-bezier(.34,1.56,.64,1);
    }

    /* ============================================================
       SCREENS
       ============================================================ */
    .screen { display: none; opacity: 0; }
    .screen.active { display: block; }

    /* ============================================================
       CLAY CARD
       ============================================================ */
    .clay-card {
      background: #fff;
      border: var(--border);
      border-radius: var(--r-card);
      box-shadow: var(--sh-card);
      padding: 28px 22px;
      margin-bottom: 14px;
    }

    /* ============================================================
       WELCOME SCREEN
       ============================================================ */
    .welcome-card { padding: 0; overflow: hidden; }
    .hero-wrap {
      width: 100%;
      border-radius: var(--r-card) var(--r-card) 0 0;
      overflow: hidden; position: relative;
    }
    .hero-img {
      display: block; width: 100%; height: auto;
      object-fit: cover;
    }
    .welcome-inner { padding: 6px 22px 24px; text-align: center; }

    .brand-badge {
      display: inline-flex; align-items: center; gap: 9px;
      margin-bottom: 20px; padding: 9px 18px;
      background: var(--graphite);
      border: 1.5px solid rgba(132,143,165,.40); border-radius: 50px;
      box-shadow: 0 4px 14px rgba(45,45,42,.28),
                  inset 0 1px 0 rgba(132,143,165,.12);
      width: fit-content;
    }
    .badge-label {
      font-family: 'Noto Serif TC', serif;
      font-size: 13px; font-weight: 600;
      color: var(--sand); letter-spacing: .06em;
    }

    .welcome-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px; font-weight: 700;
      color: var(--text); line-height: 1.55; margin-bottom: 14px;
    }
    .welcome-body {
      font-size: 15px; color: var(--text-sub);
      line-height: 2.0; margin-bottom: 22px;
    }
    .time-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
      background: var(--sand); border: var(--border);
      border-radius: 50px; padding: 5px 14px;
    }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .sticky-cta {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(to top, rgba(247,244,237,1) 65%, rgba(247,244,237,0));
      padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
      display: none;
    }
    .sticky-cta.show { display: block; }

    .btn-primary {
      display: block; width: 100%; padding: 17px 24px;
      background: linear-gradient(135deg, var(--brick-d), var(--brick));
      color: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 16px; font-weight: 600; letter-spacing: .04em;
      text-align: center; border: none; border-radius: var(--r-btn);
      box-shadow: var(--sh-btn); cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, box-shadow .12s ease;
      position: relative; overflow: hidden; min-height: 52px;
    }
    .btn-primary::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.14) 0%, transparent 55%);
      border-radius: inherit; pointer-events: none;
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(3px); box-shadow: var(--sh-btn-press);
    }
    .btn-primary:disabled { opacity: .44; cursor: not-allowed; }

    .btn-ghost {
      display: block; width: 100%; padding: 14px 24px;
      background: var(--sand); color: var(--text-sub);
      font-size: 14px; text-align: center;
      border: var(--border); border-radius: var(--r-btn);
      box-shadow: 0 3px 0 rgba(45,45,42,.10), 0 5px 14px rgba(45,45,42,.05);
      cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: background .15s, transform .1s;
      margin-top: 10px; min-height: 48px;
    }
    .btn-ghost:active { background: var(--lavender-pale); transform: translateY(2px); }

    /* ============================================================
       SCREEN 1 — CONTRAINDICATION
       ============================================================ */
    .screen-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px; font-weight: 700;
      color: var(--text); line-height: 1.55; margin-bottom: 7px;
    }
    .screen-sub {
      font-size: 14px; color: var(--text-muted);
      line-height: 1.7; margin-bottom: 20px;
    }
    .chk-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px;
      background: var(--sand-pale);
      border: 2px solid rgba(45,45,42,.13);
      border-radius: var(--r-opt); box-shadow: var(--sh-opt);
      cursor: pointer; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .15s, background .15s, box-shadow .15s;
      margin-bottom: 10px; user-select: none; min-height: 56px;
    }
    .chk-row:active, .chk-row.selected {
      border-color: var(--brick); background: #F9EAEC; box-shadow: var(--sh-opt-sel);
    }
    .chk-box {
      flex-shrink: 0; width: 22px; height: 22px;
      border: 2.5px solid rgba(45,45,42,.30);
      border-radius: 7px; background: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; margin-top: 2px;
    }
    .chk-row.selected .chk-box { background: var(--brick); border-color: var(--brick); }
    .chk-tick { opacity: 0; transition: opacity .12s; }
    .chk-row.selected .chk-tick { opacity: 1; }
    .chk-label { font-size: 15px; color: var(--text); line-height: 1.65; }

    /* ============================================================
       QUESTIONS
       ============================================================ */
    .q-num { font-size: 12px; color: var(--text-muted); letter-spacing: .1em; margin-bottom: 10px; }
    .q-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 19px; font-weight: 600;
      color: var(--text); line-height: 1.6; margin-bottom: 22px;
    }
    .q-hint {
      display: block; font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px; font-weight: 400;
      color: var(--text-muted); margin-top: 6px; letter-spacing: .01em;
    }
    .opt-btn {
      display: block; width: 100%; padding: 17px 18px;
      background: #fff;
      border: 2px solid rgba(45,45,42,.16);
      border-radius: var(--r-opt); box-shadow: var(--sh-opt);
      cursor: pointer; text-align: left;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px; color: var(--text); line-height: 1.6;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: border-color .12s, background .12s, box-shadow .12s, transform .12s;
      margin-bottom: 10px; position: relative; min-height: 54px;
    }
    .opt-btn:active {
      transform: scale(.98); border-color: var(--lavender); background: var(--lavender-pale);
    }
    .opt-btn.picked {
      border-color: var(--brick);
      background: linear-gradient(135deg, #F9EAEC, #F5E2E4);
      box-shadow: var(--sh-opt-sel);
    }
    .opt-btn.picked::after {
      content: ''; position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%); width: 8px; height: 8px;
      background: var(--brick); border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(193,73,83,.22);
    }
    .opt-inner { display: flex; align-items: center; gap: 11px; }
    .opt-dot {
      flex-shrink: 0; width: 7px; height: 7px;
      border-radius: 50%; background: rgba(45,45,42,.22);
      transition: background .12s;
    }
    .opt-btn.picked .opt-dot { background: var(--brick); }

    /* ============================================================
       RESULT SCREEN
       ============================================================ */
    .result-top { text-align: center; margin-bottom: 20px; }
    .result-icon-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 7px 0 rgba(45,45,42,.18), 0 14px 30px rgba(45,45,42,.10);
    }
    .result-icon-wrap.hi  { background: linear-gradient(135deg, var(--brick-d), var(--brick)); }
    .result-icon-wrap.mid { background: linear-gradient(135deg, var(--charcoal), var(--graphite)); }
    .result-icon-wrap.low { background: linear-gradient(135deg, #7A7888, var(--lavender)); }
    .result-icon-wrap.ask { background: linear-gradient(135deg, #4A5568, #718096); }

    .result-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 10px;
    }
    .result-desc { font-size: 14px; color: var(--text-sub); line-height: 1.95; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(45,45,42,.18), transparent);
      margin: 20px 0;
    }

    /* Ingredient card */
    .ing-cards { display: flex; flex-direction: column; gap: 11px; }
    .ing-card {
      display: flex; gap: 13px; align-items: flex-start;
      background: #fff; border: var(--border); border-radius: 16px;
      padding: 16px 18px; box-shadow: var(--sh-opt);
      opacity: 0; transform: translateY(16px);
    }
    .ing-icon {
      flex-shrink: 0; width: 38px; height: 38px; border-radius: 11px;
      background: var(--sand);
      border: 1.5px solid rgba(193,73,83,.25);
      display: flex; align-items: center; justify-content: center;
    }
    .ing-name {
      font-family: 'Noto Serif TC', serif;
      font-size: 13px; font-weight: 600; color: var(--graphite); margin-bottom: 4px;
    }
    .ing-text { font-size: 13px; color: var(--text-sub); line-height: 1.75; }
    .ing-tag {
      display: inline-block; font-size: 11px; color: var(--brick);
      background: #F9EAEC;
      border: 1px solid rgba(193,73,83,.22);
      border-radius: 50px; padding: 2px 10px; margin-top: 6px;
    }

    /* Mood image card */
    .mood-img-wrap {
      border-radius: 16px; overflow: hidden;
      margin-bottom: 14px;
      box-shadow: var(--sh-opt);
    }
    .mood-img { display: block; width: 100%; height: auto; }

    /* CTA */
    .cta-note {
      text-align: center; font-size: 13px;
      color: var(--text-muted); line-height: 1.7; margin-top: 10px;
    }
    .consult-box {
      background: var(--sand); border: var(--border);
      border-radius: 16px; padding: 18px; margin: 16px 0; box-shadow: var(--sh-opt);
    }
    .consult-box p { font-size: 14px; color: var(--text-sub); line-height: 1.85; }
    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 13px; color: var(--text-muted);
      text-decoration: none; margin-top: 20px;
      min-height: 44px; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .back-link:active { color: var(--brick); }

    .disclaimer {
      font-size: 11px; color: var(--text-muted);
      text-align: center; line-height: 1.7;
      margin-top: 12px; opacity: .8;
    }

    /* ============================================================
       REDUCED MOTION
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .screen { transition: none !important; }
      .ing-card { opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body>

<div class="blob-bg" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="app">
  <div class="quiz-wrap">

    <!-- Progress bar (hidden on welcome/result) -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-meta">
        <span id="progressLabel">問題 1 / 3</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- ============================================================
         SCREEN 0 — WELCOME
         ============================================================ -->
    <div class="screen active" id="screen0">
      <div class="clay-card welcome-card" style="margin-top:20px;">
        <div class="hero-wrap">
          <img class="hero-img" src="hero.webp" alt="玫瑰花安心飲片" width="540" height="720">
        </div>
        <div class="welcome-inner">
          <div class="brand-badge" style="margin: -14px auto 18px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--sand)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 22C6.5 22 2 17.5 2 12S6.5 2 12 2s10 4.5 10 10-4.5 10-10 10z"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            <span class="badge-label">玫瑰花安心飲片</span>
          </div>
          <h1 class="welcome-title">
            這杯玫瑰花茶，<br>適合現在的你嗎？
          </h1>
          <p class="welcome-body">
            最近生活節奏有點快，情緒有時候也說不清楚？<br>
            回答幾個簡單的問題，<br>看看這款安心茶飲是否符合你現在的狀態。
          </p>
          <div class="time-chip">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </svg>
            約 1–2 分鐘
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================================
         SCREEN 1 — CONTRAINDICATION CHECK
         ============================================================ -->
    <div class="screen" id="screen1">
      <div class="clay-card" style="margin-top:20px;">
        <h2 class="screen-title">先確認幾件事</h2>
        <p class="screen-sub">選出符合你情況的選項（可多選）；如果都沒有，直接點「繼續」就好。</p>
        <div id="chkList">
          <label class="chk-row" data-val="pregnant">
            <div class="chk-box">
              <svg class="chk-tick" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="chk-label">目前懷孕或正在哺乳</span>
          </label>
          <label class="chk-row" data-val="digestion">
            <div class="chk-box">
              <svg class="chk-tick" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="chk-label">腸胃比較敏感，容易腹瀉</span>
          </label>
          <label class="chk-row" data-val="meds">
            <div class="chk-box">
              <svg class="chk-tick" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="chk-label">正在服用特定處方藥物</span>
          </label>
        </div>
      </div>
    </div>

    <!-- ============================================================
         SCREENS 2–5 — QUIZ QUESTIONS (generated by JS)
         ============================================================ -->
    <div class="screen" id="screen2">
      <div class="clay-card" style="margin-top:8px;">
        <div class="q-num" id="qNum2"></div>
        <div class="q-text" id="qText2"></div>
        <div id="qOpts2"></div>
      </div>
    </div>
    <div class="screen" id="screen3">
      <div class="clay-card" style="margin-top:8px;">
        <div class="q-num" id="qNum3"></div>
        <div class="q-text" id="qText3"></div>
        <div id="qOpts3"></div>
      </div>
    </div>
    <div class="screen" id="screen4">
      <div class="clay-card" style="margin-top:8px;">
        <div class="q-num" id="qNum4"></div>
        <div class="q-text" id="qText4"></div>
        <div id="qOpts4"></div>
      </div>
    </div>
    <div class="screen" id="screen5">
      <div class="clay-card" style="margin-top:8px;">
        <div class="q-num" id="qNum5"></div>
        <div class="q-text" id="qText5"></div>
        <div id="qOpts5"></div>
      </div>
    </div>

    <!-- ============================================================
         SCREEN 6 — RESULT
         ============================================================ -->
    <div class="screen" id="screen6">
      <div class="clay-card" style="margin-top:20px;">

        <!-- Result top -->
        <div class="result-top">
          <div class="result-icon-wrap" id="rIconWrap">
            <!-- icon filled by JS -->
          </div>
          <h2 class="result-title" id="rTitle"></h2>
          <p class="result-desc" id="rDesc"></p>
        </div>

        <!-- Ingredient cards / consult box -->
        <div class="divider" aria-hidden="true"></div>
        <div id="rIngSection"></div>

        <!-- CTA -->
        <div id="rCTA" style="margin-top:4px;"></div>
        <p class="cta-note" id="rNote"></p>
        <p class="disclaimer" id="rDisc"></p>
      </div>

    </div><!-- /screen6 -->

  </div><!-- .quiz-wrap -->
</div><!-- .app -->

<!-- Sticky CTA -->
<div class="sticky-cta" id="stickyCTA"></div>

<script>
/* ================================================================
   QUESTIONS DATA  （4 題）
   ================================================================ */
const QUESTIONS = [
  {
    text: '最近的心情，是這樣嗎？',
    hint: '中醫說的「肝氣不舒」，就是這種感覺',
    opts: [

/* ================================================================

const ING = {

/* ================================================================
   STATE
   ================================================================ */
const S = { screen: 0, answers: {}, tags: {}, score: 0, hasAsk: false, askType: '' };
const TOTAL_Q = QUESTIONS.length;
const RESULT_SCREEN = 6;   // screens 2–5 = questions, 6 = result

/* ================================================================
   HELPERS
   ================================================================ */
function qs(sel, ctx) { return (ctx || document).querySelector(sel); }
function gsapIn(el) {
  if (!el) return;
  const noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (noMotion) { el.style.opacity = 1; return; }
  gsap.fromTo(el, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: .22, ease: 'power2.out' });
}

function showScreen(idx) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.opacity = '0';
  });
  const next = qs(`#screen${idx}`);
  if (!next) return;
  next.classList.add('active');
  S.screen = idx;
  gsapIn(next);
  updateProgress();
  updateCTA();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function updateProgress() {
  const wrap = qs('#progressWrap');
  const fill = qs('#progressFill');
  const label = qs('#progressLabel');
  const pct = qs('#progressPct');
  const isQuiz = S.screen >= 2 && S.screen <= 5;
  wrap.classList.toggle('show', isQuiz);
  if (isQuiz) {
    const qIdx = S.screen - 2;
    const p = Math.round((qIdx / TOTAL_Q) * 100);
    fill.style.width = p + '%';
    label.textContent = `問題 ${qIdx + 1} / ${TOTAL_Q}`;
    pct.textContent = p + '%';
  }
}

function updateCTA() {
  const cta = qs('#stickyCTA');
  cta.innerHTML = '';
  cta.classList.remove('show');

  const make = (text, onClick, id) => {
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    if (id) btn.id = id;
    btn.textContent = text;
    btn.addEventListener('click', onClick);
    return btn;
  };

  if (S.screen === 0) {
    cta.appendChild(make('開始測驗', () => showScreen(1)));
    cta.classList.add('show');
  } else if (S.screen === 1) {
    cta.appendChild(make('繼續', () => { showScreen(2); buildQuestion(2, 0); }, 'btnContinue'));
    cta.classList.add('show');
  } else if (S.screen >= 2 && S.screen <= 5) {
    const qIdx = S.screen - 2;
    const isLast = qIdx === TOTAL_Q - 1;
    const btn = make(isLast ? '查看結果' : '下一題', () => advanceQ(qIdx), 'btnNext');
    btn.disabled = (S.answers[qIdx] === undefined);
    cta.appendChild(btn);
    cta.classList.add('show');
  }
}

/* ================================================================
   BUILD QUESTIONS
   ================================================================ */
function buildQuestion(screenId, qIdx) {
  const q = QUESTIONS[qIdx];
  qs(`#qNum${screenId}`).textContent = `問題 ${qIdx + 1} / ${TOTAL_Q}`;
  qs(`#qText${screenId}`).innerHTML = q.text + (q.hint ? `<span class="q-hint">${q.hint}</span>` : '');
  const container = qs(`#qOpts${screenId}`);
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (S.answers[qIdx] === i) btn.classList.add('picked');
    btn.innerHTML = `<div class="opt-inner"><div class="opt-dot"></div><span>${opt.text}</span></div>`;
    btn.addEventListener('click', () => selectOpt(screenId, qIdx, i));
    container.appendChild(btn);
  });
}

function selectOpt(screenId, qIdx, optIdx) {
  S.answers[qIdx] = optIdx;
  qs(`#qOpts${screenId}`).querySelectorAll('.opt-btn').forEach((b, i) => {
    b.classList.toggle('picked', i === optIdx);
  });
  const btn = qs('#btnNext');
  if (btn) btn.disabled = false;
}

function advanceQ(qIdx) {
  if (S.answers[qIdx] === undefined) return;
  const opt = QUESTIONS[qIdx].opts[S.answers[qIdx]];
  S.score += opt.score || 0;
  if (opt.tag) S.tags[opt.tag] = (S.tags[opt.tag] || 0) + opt.score;

  const nextScreen = S.screen + 1;
  if (nextScreen <= 5) {
    showScreen(nextScreen);
    buildQuestion(nextScreen, qIdx + 1);
  } else {
    showResult();
  }
}

/* ================================================================
   CONTRAINDICATION
   ================================================================ */
document.querySelectorAll('.chk-row').forEach(row => {
  row.addEventListener('click', () => {
    row.classList.toggle('selected');
    const selected = [...document.querySelectorAll('.chk-row.selected')];
    S.hasAsk = selected.length > 0;
    S.askType = selected.map(r => r.dataset.val).join(',');
  });
});

/* ================================================================
   BUILD RESULT
   ================================================================ */
function showResult() {
  if (S.hasAsk)         buildAsk();
  else if (S.score >= 6) buildHi();
  else if (S.score >= 2) buildMid();
  else                   buildLow();
  qs('#progressWrap').classList.remove('show');
  showScreen(RESULT_SCREEN);
  animateIngCards();
  buildResultCTA();
}

function setResultTop(cls, iconSVG, title, desc) {
  const w = qs('#rIconWrap');
  w.className = `result-icon-wrap ${cls}`;
  w.innerHTML = iconSVG;
  qs('#rTitle').textContent = title;
  qs('#rTitle').style.color = cls === 'hi' ? 'var(--brick-d)' : cls === 'ask' ? '#4A5568' : 'var(--graphite)';
  qs('#rDesc').textContent = desc;
}

const ICON_OK    = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C6.5 22 2 17.5 2 12S6.5 2 12 2s10 4.5 10 10-4.5 10-10 10z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>`;
const ICON_WARN  = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;

function buildHi() {
  setResultTop('hi', ICON_HEART, '很適合你現在的狀態',
    '你描述的這些感受——情緒鬱悶、氣散不開、身體有點緊——正是玫瑰花「行氣解鬱、活血止痛」最能幫上忙的地方。男女都適合，不限性別。');
  buildIngCards();
  qs('#rNote').textContent = '本品為日常調養茶飲，不取代醫療或處方建議。';
}

function buildMid() {
  setResultTop('mid', ICON_OK, '有些地方對得上',

  buildIngCards();
  qs('#rNote').textContent = '本品為日常調養茶飲，不取代醫療或處方建議。';
}

function buildLow() {
  setResultTop('low', ICON_OK, '你的狀態已經不錯了',
    '從你的回答看，目前沒有特別明顯的不適。這款玫瑰花茶更適合作為「讓好狀態繼續維持」的日常茶飲選擇。');
  qs('#rIngSection').innerHTML = `
    <div class="mood-img-wrap">
      <img class="mood-img" src="mood.webp" alt="玫瑰花飲片情境" loading="lazy">
    </div>
    <p style="font-size:14px; color:var(--text-sub); line-height:1.85; margin-bottom:10px;">
      每天 3–5 朵，熱水沖泡就能喝到清雅花香。無咖啡因、選用安心藥材，讓日常的一杯茶也讓你放心。
    </p>`;
  qs('#rNote').textContent = '本品為日常調養茶飲，不取代醫療或處方建議。';
}

function buildAsk() {
  const isDigestion = S.askType.includes('digestion');
  const isPregnant  = S.askType.includes('pregnant');
  let bodyText = '在使用任何中藥材前，和中醫師或藥師確認一下，是對自己最好的照顧。進診間時，不妨帶上這款產品的資訊，讓醫師幫你評估。';
  if (isDigestion && !isPregnant) {
    bodyText = '玫瑰花行氣作用較強，腸胃比較敏感或容易腹瀉的人，建議先從少量開始試試，或進診間和中醫師討論適合你的用量與搭配方式。';
  }
  setResultTop('ask', ICON_WARN, '建議先跟中醫師聊聊',
    '不是不能喝，而是讓醫師幫你確認最適合的方式，喝起來才更安心。');
  qs('#rIngSection').innerHTML = `<div class="consult-box"><p>${bodyText}</p></div>`;
  qs('#rNote').textContent = '';
  qs('#rDisc').textContent = '';
}

function buildIngCards() {
  const keys = [];
  if ((S.tags.mood     || 0) >= 1) keys.push('mood');
  if ((S.tags.physical || 0) >= 1) keys.push('physical');
  if ((S.tags.period   || 0) >= 1) keys.push('period');
  if ((S.tags.drink    || 0) >= 1) keys.push('drink');
  if (keys.length === 0) keys.push('mood', 'drink');

  const section = qs('#rIngSection');
  section.innerHTML = `
    <p style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">根據你的填答，這些面向對你可能最有幫助：</p>
    <div class="ing-cards" id="ingCards"></div>`;
  const container = qs('#ingCards');
  keys.forEach(k => {
    const ing = ING[k];
    if (!ing) return;
    const card = document.createElement('div');
    card.className = 'ing-card';
    card.innerHTML = `
      <div class="ing-icon">${ing.svg}</div>
      <div>
        <div class="ing-name">${ing.name}</div>
        <div class="ing-text">${ing.text}</div>
        <span class="ing-tag">${ing.tag}</span>
      </div>`;
    container.appendChild(card);
  });
}

function animateIngCards() {
  const noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (noMotion) {
    document.querySelectorAll('.ing-card').forEach(c => { c.style.opacity = 1; c.style.transform = 'none'; });
    return;
  }
  setTimeout(() => {
    gsap.to('.ing-card', { opacity: 1, y: 0, duration: .45, ease: 'power2.out', stagger: .10 });
  }, 280);
}

function buildResultCTA() {
  const ctaWrap = qs('#stickyCTA');
  ctaWrap.innerHTML = '';
  ctaWrap.classList.add('show');

  if (S.hasAsk) {
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.textContent = '與中醫師討論看看';
    ctaWrap.appendChild(btn);
    const ghost = document.createElement('button');
    ghost.className = 'btn-ghost';
    ghost.textContent = '回到產品目錄';
    ghost.addEventListener('click', () => { window.location.href = '../index.html'; });
    ctaWrap.appendChild(ghost);
    return;
  }

  const main = document.createElement('button');
  main.className = 'btn-primary';
  main.textContent = '了解如何取得';
  ctaWrap.appendChild(main);

  const ghost = document.createElement('button');
  ghost.className = 'btn-ghost';
  ghost.textContent = '回到產品目錄';
  ghost.addEventListener('click', () => { window.location.href = '../index.html'; });
  ctaWrap.appendChild(ghost);
}

/* ================================================================
   INIT
   ================================================================ */
[2, 3, 4, 5].forEach((sid, qi) => buildQuestion(sid, qi));
showScreen(0);
